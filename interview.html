  "红颜色的头发有两三种，还穿的铆钉的靴子，虽然我跟他们不是很熟，但是我能感知得到那种性格的气氛，我能感觉得到当时已经浅浅的在我心里萌生了，他们这就是自由的，他们这就是个性的，这个可以说在我眼里和我父母是相违背的，他们可以做自己能做想做的事情，他们是自由的，我认为我慢慢到接触到他们之后，我就觉得。": "with two or three shades of red in their hair, and wearing studded boots. Although I wasn’t very close to them, I could feel that kind of personality, that atmosphere. I could feel something quietly taking root in my heart: they were freedom, they were individuality. In my eyes, they were the opposite of my parents. They could do what they wanted to do. They were free. After slowly coming into contact with them, I felt that",
  "我的人生要发生一些改变，我的人生要我来做主才行，哪怕是错的。": "my life needed to change. I needed to be the one in charge of my life, even if I was wrong.",
  "只想通过头发，或者是通过穿着打扮来发泄，就想着去把头发弄一下，弄得吸引人，让他们感觉想很想跟你交朋友，感觉你很独特，就算别人骂自己两句，也有人跟自己说话，就算别人怎么看无所谓，只要他愿意跟自己说话，哪怕是吵一架，至少有个人愿意跟我吵架之类的。": "I just wanted to vent through my hair or through the way I dressed. I wanted to style my hair so it would attract people, so they would want to make friends with me and feel that I was unique. Even if someone cursed at me, at least someone was talking to me. It didn’t matter how people saw me, as long as they were willing to talk to me. Even if it was an argument, at least there was someone willing to argue with me.",
  "因为我搞杀马特或者是非主流，还有他也搞杀马特，我觉得我们两个追求的性格个性是一样的，我们聊天各方面可以聊出一个人有一段历史，两个人互相聊着聊着，对这个发型、对追求都觉得有自己的共同目标，才有共同的语言去聊天各方面，对吧？": "Because I was into Shamate or non-mainstream style, and he was also into Shamate, I felt that the personalities and individuality we were pursuing were the same. When we talked, we could talk about a person’s history. As we kept chatting, we felt that we had a shared goal in this hairstyle and this pursuit, and that was why we had a common language, right?",
  "如果说我，你叫我们玩杀马特的，跟一个平头的在那聊，无法是沟通的。": "If you asked people like us who played with Shamate style to chat with someone with a plain buzz cut, there was no way to communicate.",
  "他觉得你这个发型不怎么样，我都不想理你，我觉得他剃个平头，我说实话，你长得那么丑，我还懒得搭理你。": "He might think my hairstyle was no good, and I wouldn’t even want to bother with him. If he had a buzz cut, honestly, I would think he looked so ugly that I couldn’t be bothered to talk to him.",
  "挣钱、买车、买房，当然这种梦想谁都有，咱自己也知道自己出去打了，自己打工了，这也知道这种很难实现的对不对？": "Making money, buying a car, buying a house—of course everyone has those dreams. But once we went out to work, we also knew these things were very hard to achieve, right?",
  "随之而来也就放弃了，因为自己知道这个根本不可能，难实现。": "So gradually we gave up, because we knew it was basically impossible and very hard to realize.",
  "我选择了放弃，选择了自由。其他人，你说他心里面没什么想法，那不可能的。": "I chose to give up, and I chose freedom. As for other people, if you say they had no thoughts in their hearts, that’s impossible.",
  "像我们这种人的话，有时候你会觉得这个钱是能算得到的，一年，比方说给你4万，两年8万算，那要打工十年、二十年才能获得这套房这辆车。": "For people like us, sometimes you feel that money can be calculated. Say you earn forty thousand a year, eighty thousand in two years; you would have to work ten or twenty years to get that house or that car.",
  "对呀，这些东西比方说动不动就多少千万，动不动多少百万，还有这些东西想都没有去想过，甚至不敢去想。": "Yes, things like that can easily cost tens of millions or millions. We never even thought about them, or even dared to think about them.",
  "这些东西跟你没有关系，关键是对，你在这里也消费不起。": "Those things have nothing to do with you. The key is that you can’t afford to consume here.",
  "现在待在这里都感觉，是吧？": "Even just staying here now gives you that feeling, right?",
  "待在这里的话都感觉有一种感觉，就活不长的人会有一种感觉，对，比方说我现在月入两三万或者1万以上，我在这地方压力还没那么大，你说几千块钱，你在那个地方干什么嘛？": "Staying here gives you a feeling like you won’t last long. If I made twenty or thirty thousand a month, or at least over ten thousand, the pressure here wouldn’t be so great. But if you only make a few thousand, what are you doing in a place like that?",
  "有什么好看的，是吧？": "What is there to look at, right?",
  "看一下那个楼哦，好高哦，怎么样？": "Look at that building—oh, it’s so tall—so what?",
  "所以我都很少这样抬头去看一栋楼的。": "So I rarely look up at buildings like that.",
  "当时那里面总而言之就感觉好像很多都跟我们是一样的，留着那种长头发，感觉好像自己就适合在这环境里面生存那种，唯一不解的一点就是感觉好像大家好像都没有工作，反正那时候大家出去玩都玩的挺开心的。": "At that time, in that place, it felt like many people were the same as us, with that kind of long hair. It felt like I was suited to survive in that environment. The only thing I didn’t understand was that it seemed like nobody had a job. Anyway, when everyone went out to play, they were pretty happy.",
  "唯一一点就是你身上也没钱，我身上也没钱，那时候就不去溜冰场，就去公园里面玩，就这样去公园里面，就在公园里面三五成群的坐着，就聊天这种。": "The only thing was that you had no money, and I had no money either. So we wouldn’t go to the skating rink; we would go to the park. We would sit in small groups of three or five in the park and chat.",
  "就比如说你，跟我俩都留了类似的头发，对吧？": "For example, if you and I had similar hairstyles, right?",
  "我就要告诉你，你这头发应该换一下，应该怎么剪啊？": "I would tell you that your hair should be changed, how it should be cut.",
  "应该留什么颜色这样好看？": "What color you should keep so it would look good.",
  "有这种话题也不是说没人谈理想，有理想大家都不谈，因为你那时候都知道自己都没有上班，都实现不了，你还去谈它干嘛？": "We had topics like that. It wasn’t that nobody had ideals, but nobody talked about them, because at that time we all knew we weren’t working and couldn’t realize them. So why talk about them?",
  "那谈出来肯定成笑话对不对？": "If you talked about them, they would definitely become a joke, right?",
  "也就没想过要去谈，玩着玩着在外面的话也就是瞎逛，感觉也没啥玩的，各自回家了以后又在那个什么。QQ上玩吧。": "So we never thought about talking about them. When we were out playing, we were really just wandering around. There didn’t seem to be much to do. After going home, we would just play on QQ.",
  "反正只要是杀马特，我们不管残血障碍或者是别的，但是只要你是杀马特非主流都是有一个家的感觉，因为大家可能有一种感觉，就是说我们是一种人，别人都是会觉得我们大家不正常，但是我们还能坚持下去，是一个家，只要是玩杀马特都是我们的家人。": "As long as you were Shamate, whether you were Canxue Zhangai or from another group, as long as you were Shamate or non-mainstream, there was a feeling of having a home. Maybe everyone felt that we were the same kind of people. Others thought we were all abnormal, but we could still keep going. It was a home. As long as you played with Shamate style, you were our family.",
  "我发现社会不一样了，他们觉得我头发太长，觉得我年纪太小，亦或者是觉得我感觉看我外表，觉得我这个人不踏实，所以换了很多工作，这期间的话做过服务员，做过传菜员，弄过洗衣店搬家，洗过车，做过网吧，做过网管，最困难的时候身上只有 20 块钱，不敢乱花，也不敢乱用。": "I found that society was different. People thought my hair was too long, that I was too young, or they looked at my appearance and felt I wasn’t reliable. So I changed jobs many times. During that period, I worked as a waiter, a food runner, at a laundry, doing moving jobs, washing cars, in internet cafés, and as a network administrator. At the hardest time, I had only twenty yuan on me, and I didn’t dare spend it carelessly.",
  "当时住在昆明的一个城中村的小房子里边，特别灰暗，24 小时都需要开的那种。黑的就觉得是生活没意思。": "At that time, I lived in a small room in an urban village in Kunming. It was especially dim, the kind of place where the light had to be on twenty-four hours a day. It was so dark that life felt meaningless.",
  "其实我一直心里有一个小小的愿望，如果下次我结婚，我肯定办一个杀马特的婚礼，是两套婚纱照，必须要有一个杀马特的造型，小女孩的样子，这样回忆很多年，珍藏起来。": "Actually, I have always had a small wish in my heart. If I get married next time, I will definitely have a Shamate wedding. For the wedding photos, there must be a Shamate look, a little-girl version of myself, so I can remember it for many years and keep it as something precious.",
  "那段时间，快手官方在整顿的那段时间，整顿那段时间让我们有半个月的时间没有拍作品，我们家里面的事情忙完以后，我们就开直播，突然间就没有人点进来，我们就用手机搜索快手的 ID 号，搜索不了名字也搜索不了，我们就打电话给官方咨询，咨询了之后我们这个号在广场上跳过舞。": "During that period, when Kuaishou was carrying out an official cleanup, we couldn’t make any videos for half a month. After we finished dealing with things at home, we started a livestream, and suddenly nobody came in. We searched for our Kuaishou ID on our phones, but neither the ID nor the name could be found. We called the platform to ask, and after consulting them, they said our account had danced in a public square.",
  "对社会造成危害，我们跳舞，我们是在广场上去直播，直过播一次，但是没有经常去，就是我们都是在家里面，我们就是跳跳舞逗大家开心，但是突然间给我们封了，我们都找不了这样的原因。": "They said it caused harm to society. We danced, and yes, we had livestreamed once in a public square, but we didn’t go there often. Most of the time we were at home, just dancing to make everyone happy. Then suddenly our account was blocked, and we couldn’t understand the reason.",
  "来打工的人，基本上所有人都出去外面打工，不会说待在家里，因为他们坚信着一句话就是困难，困在家里肯定困难出路，走出去就有路，农村人可能会觉得城里人跟我们是一样，而城里人的人可能有些人会认为跟我农村人跟我们是不一样。": "People who came out to work—basically everyone went outside to work. They wouldn’t stay at home, because they firmly believed in a saying: if you stay trapped at home, things will definitely be difficult; if you go out, there will be a road. Rural people might think city people are the same as us, while some city people might think rural people are different from them.",
  "城里人肯定不会说玩农村人玩过的东西，农村人肯定会玩，农村人玩的东西也会玩城里面的东西，有些东西玩不了就不玩。": "City people definitely wouldn’t play with things that rural people had played with. Rural people would play with rural things, and also play with city things. If there were things they couldn’t play with, then they simply wouldn’t.",
  "不如直接玩农村里的东西，所以更多的都是农村的人玩，城里的人可能会比较少，因为他觉得这个东西，他们认为这个东西很土，每个人追求的东西不一样，杀马特的话可能只能追求杀马特，因为他没有其他东西，他追求不了。": "So it was better to just play with things from the countryside. That’s why more rural people played with it, while city people were probably fewer, because they felt it was tacky. Everyone pursues different things. For Shamate, maybe they could only pursue Shamate, because they didn’t have anything else they could pursue.",
  "房车太遥远了，有背景的还好一点，没有什么背景的，或者是老一辈、父一辈没有给他打下基础的。": "Houses and cars were too far away. It was easier for people with a background, but not for those without any background, or those whose parents and grandparents hadn’t laid a foundation for them.",
  "现在这个社会，比方说现在来，我比方说我现在出门,或者在那个年代出门，感觉就是:第一时间我居然想到的是进厂，我发现所有人跟我想的想法都是一样，我们出来干嘛？进厂啊？难道没有别的了吗？没有别的了，你只有这个选择，我发现就一个选择了。": "In today’s society, or even back then, whenever I went out, the first thing I thought of was entering a factory. I realized everyone thought the same way. Why did we come out? To enter a factory. Was there nothing else? There was nothing else. You only had that one choice. I found there was only one option.",
  "对啊，那单这个选择的话，你肯定会觉得很无聊，可能会找一些有趣的东西，头发就是一个有趣的东西。对呀，你没有其他更有趣的东西，玩车、玩什么之类的？你玩不起，那我只能玩头发。是吧？": "Yes, if you only have that one choice, you definitely feel bored, so you might look for something interesting. Hair was one interesting thing. You didn’t have other, more interesting things—cars or whatever—you couldn’t afford to play with those. So I could only play with hair, right?",
  "只要这个社会，只要这个世界还存在的，它就一定会有被淘汰也好，被伤害的人也好，不被尊重的人也好，对，农村不会消失，除非农村消失了，教育可能更好了，个个都上过大学了，它可能会消失，说不定也不会消失。说不定它会改变。": "As long as this society and this world still exist, there will always be people who are eliminated, hurt, or not respected. Yes, the countryside won’t disappear. Unless the countryside disappears, or education becomes better and everyone has gone to university, then it might disappear—or maybe it still won’t. Maybe it will change.",
  "但是可能杀马特会以另外一种生一种方式生存，也不一定，是吧？": "But maybe Shamate will survive in another form, in another way. That’s possible, right?"
};

function escapeHTML(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getMessageHighlights(message) {
  const highlights = currentLang === "en" ? message.highlightsEn : message.highlights;
  return Array.isArray(highlights) ? highlights.filter(Boolean) : [];
}

function renderHighlightedText(fullText, visibleCount, highlights) {
  const text = String(fullText || "");
  const maxVisible = Math.min(text.length, Math.max(0, visibleCount));

  if (!maxVisible) return "";

  const ranges = [];

  highlights.forEach((phrase) => {
    const key = String(phrase || "");
    if (!key) return;

    let from = 0;
    while (from < text.length) {
      const start = text.indexOf(key, from);
      if (start === -1) break;

      const end = start + key.length;
      if (start < maxVisible && end > 0) {
        ranges.push([
          Math.max(0, start),
          Math.min(maxVisible, end)
        ]);
      }

      from = start + key.length;
    }
  });

  if (!ranges.length) {
    return `<span class="qq-normal">${escapeHTML(text.slice(0, maxVisible))}</span>`;
  }

  ranges.sort((a, b) => a[0] - b[0]);

  const merged = [];
  ranges.forEach((range) => {
    if (!merged.length || range[0] > merged[merged.length - 1][1]) {
      merged.push(range);
    } else {
      merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], range[1]);
    }
  });

  let html = "";
  let cursor = 0;

  merged.forEach(([start, end]) => {
    if (start > cursor) {
      html += `<span class="qq-normal">${escapeHTML(text.slice(cursor, start))}</span>`;
    }

    html += `<span class="qq-highlight">${escapeHTML(text.slice(start, end))}</span>`;
    cursor = end;
  });

  if (cursor < maxVisible) {
    html += `<span class="qq-normal">${escapeHTML(text.slice(cursor, maxVisible))}</span>`;
  }

  return html;
}

function finishQQChat() {
  if (!qqChat) return;

  const item = interviews[currentIndex];
  const messages = item.messages || [];

  messages.forEach((message, index) => {
    let bubble = qqChat.querySelector(`[data-message-index="${index}"]`);

    if (!bubble) {
      bubble = createQQBubble(message, index, item.name);
    }

    const typedEl = bubble.querySelector(".qq-typed");
    const cursorEl = bubble.querySelector(".qq-cursor");

    if (typedEl) {
      const fullText = getMessageText(message);
      typedEl.innerHTML = renderHighlightedText(
        fullText,
        fullText.length,
        getMessageHighlights(message)
      );
    }

    if (cursorEl) {
      cursorEl.classList.add("is-hidden");
    }
  });

  scrollQQToBottom();
}

  if (!messages.length) {
    clearQQChat();

    const end = message.end || message.start + 2;
    const text = getMessageText(message);

    let bubble = qqChat.querySelector(`[data-message-index="${index}"]`);

    if (time < start) {
      if (bubble) bubble.remove();
      return;

      bubble = createQQBubble(message, index, item.name);
    }

    const typedEl = bubble.querySelector(".qq-typed");
const cursorEl = bubble.querySelector(".qq-cursor");

const duration = Math.max(0.3, end - start);
const progress = Math.min(1, Math.max(0, (time - start) / duration));
const visibleCount = Math.floor(text.length * progress);

if (typedEl) {
  typedEl.innerHTML = renderHighlightedText(
    text,
    visibleCount,
    getMessageHighlights(message)
  );
}
if (cursorEl) {
  cursorEl.classList.toggle("is-hidden", progress >= 1);
}
  });

    function formatTime(seconds) {
      if (!Number.isFinite(seconds)) return "00:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * window.devicePixelRatio);
      canvas.height = Math.floor(rect.height * window.devicePixelRatio);
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function clearVisualStage() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, w, h);

  return { w, h };
}

function drawWaves(power, time) {
  const { w, h } = clearVisualStage();

  ctx.strokeStyle = "#FF5874";
  ctx.lineWidth = 8 + power * 34;
  ctx.shadowColor = "rgba(210, 65, 89, 0.55)";
  ctx.shadowBlur = 10 + power * 36;

  for (let i = 0; i < 6; i++) {
    const offset = i * 0.12;
    const amp = 45 + power * 180 + i * 8;

    ctx.beginPath();

    for (let x = -80; x <= w + 80; x += 18) {
      const y =
        h * (0.28 + offset) +
        Math.sin(x * 0.01 + time * 1.8 + i) * amp * 0.22 +
        Math.sin(x * 0.024 + time * 1.1) * amp * 0.12;

      if (x === -80) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

function drawRings(power, time) {
  const { w, h } = clearVisualStage();

  const cx = w * 0.5;
  const cy = h * 0.5;
  const base = 40 + power * 80;

  ctx.strokeStyle = "#FF5874";
  ctx.shadowColor = "rgba(210, 65, 89, 0.45)";
  ctx.shadowBlur = 16 + power * 26;

  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.lineWidth = 4 + power * 12;
    ctx.arc(
      cx,
      cy,
      base + i * (34 + power * 10) + Math.sin(time * 2 + i) * 6,
      0,
      Math.PI * 2
    );
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

function drawBars(power, time) {
  const { w, h } = clearVisualStage();

  const barCount = 24;
  const gap = 10;
  const totalGap = gap * (barCount - 1);
  const barWidth = (w * 0.62 - totalGap) / barCount;
  const startX = (w - (barCount * barWidth + totalGap)) / 2;

  ctx.fillStyle = "#FF5874";
  ctx.shadowColor = "rgba(210, 65, 89, 0.35)";
  ctx.shadowBlur = 10 + power * 20;

  for (let i = 0; i < barCount; i++) {
    const x = startX + i * (barWidth + gap);
    const noise = Math.sin(time * 3 + i * 0.6) * 0.5 + 0.5;
    const barH = 40 + noise * (h * 0.45) * (0.35 + power);

    ctx.fillRect(x, h * 0.5 - barH / 2, barWidth, barH);
  }

  ctx.shadowBlur = 0;
}

function drawRays(power, time) {
  const { w, h } = clearVisualStage();

  const cx = w * 0.52;
  const cy = h * 0.52;
  const rayCount = 18;

  ctx.strokeStyle = "#FF5874";
  ctx.lineWidth = 4 + power * 14;
  ctx.shadowColor = "rgba(210, 65, 89, 0.45)";
  ctx.shadowBlur = 12 + power * 28;

  for (let i = 0; i < rayCount; i++) {
    const angle = (Math.PI * 2 / rayCount) * i + time * 0.25;
    const inner = 30 + power * 20;
    const outer = 120 + power * 220 + Math.sin(time * 2 + i) * 18;

    const x1 = cx + Math.cos(angle) * inner;
    const y1 = cy + Math.sin(angle) * inner;
    const x2 = cx + Math.cos(angle) * outer;
    const y2 = cy + Math.sin(angle) * outer;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}
function drawDots(power, time) {
  const { w, h } = clearVisualStage();

  const cols = 18;
  const rows = 10;
  const gapX = w / cols;
  const gapY = h / rows;

  ctx.fillStyle = "#FF5874";
  ctx.shadowColor = "rgba(255, 88, 116, 0.45)";
  ctx.shadowBlur = 8 + power * 28;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const px = gapX * x + gapX / 2;
      const py = gapY * y + gapY / 2;
      const pulse = Math.sin(time * 4 + x * 0.6 + y * 0.4) * 0.5 + 0.5;
      const r = 4 + pulse * 8 + power * 24;

      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.shadowBlur = 0;
}

function drawHair(power, time) {
  const { w, h } = clearVisualStage();

  const cx = w * 0.5;
  const cy = h * 0.52;
  const count = 56;

  ctx.strokeStyle = "#FF5874";
  ctx.lineWidth = 3 + power * 8;
  ctx.shadowColor = "rgba(255, 88, 116, 0.55)";
  ctx.shadowBlur = 10 + power * 30;

  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    const shake = Math.sin(time * 5 + i) * 22;
    const inner = 40 + power * 30;
    const outer = 120 + power * 260 + shake;

    const x1 = cx + Math.cos(angle) * inner;
    const y1 = cy + Math.sin(angle) * inner;
    const x2 = cx + Math.cos(angle) * outer;
    const y2 = cy + Math.sin(angle) * outer;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.fillStyle = "#53BDFF";
  ctx.arc(cx, cy, 38 + power * 45, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawGlitch(power, time) {
  const { w, h } = clearVisualStage();

  ctx.fillStyle = "#FF5874";
  ctx.shadowColor = "rgba(255, 88, 116, 0.4)";
  ctx.shadowBlur = 8 + power * 20;

  const blockCount = 20 + Math.floor(power * 70);

  for (let i = 0; i < blockCount; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const bw = 30 + Math.random() * 180 * (0.5 + power);
    const bh = 8 + Math.random() * 50 * (0.5 + power);

    ctx.fillRect(x, y, bw, bh);
  }

  ctx.strokeStyle = "#53BDFF";
  ctx.lineWidth = 2;

  for (let i = 0; i < 10; i++) {
    const y = (h / 10) * i + Math.sin(time * 3 + i) * power * 40;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

function drawSpiral(power, time) {
  const { w, h } = clearVisualStage();

  const cx = w * 0.5;
  const cy = h * 0.5;

  ctx.strokeStyle = "#FF5874";
  ctx.lineWidth = 4 + power * 12;
  ctx.shadowColor = "rgba(255, 88, 116, 0.55)";
  ctx.shadowBlur = 12 + power * 30;

  ctx.beginPath();

  for (let i = 0; i < 420; i++) {
    const t = i * 0.08;
    const radius = i * 0.7 + power * 90;
    const angle = t + time * 1.5;

    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawByMode(mode, power, time) {
  switch (mode) {
    case "rings":
      drawRings(power, time);
      break;

    case "bars":
      drawBars(power, time);
      break;

    case "rays":
      drawRays(power, time);
      break;

    case "dots":
      drawDots(power, time);
      break;

    case "hair":
      drawHair(power, time);
      break;

    case "glitch":
      drawGlitch(power, time);
      break;

    case "spiral":
      drawSpiral(power, time);
      break;

    case "waves":
    default:
      drawWaves(power, time);
      break;
  }
}

function drawIdleVisual() {
  const mode = getCurrentVisualMode();
  drawByMode(mode, 0.12, performance.now() * 0.001);
}

function drawAudioVisual() {
  if (!analyser || !dataArray || audio.paused) {
    drawIdleVisual();
    requestAnimationFrame(drawAudioVisual);
    return;
  }

  analyser.getByteFrequencyData(dataArray);

  let average = 0;
  for (let i = 0; i < dataArray.length; i++) {
    average += dataArray[i];
  }
  average = average / dataArray.length;

  const power = average / 255;
  const time = performance.now() * 0.0015;
  const mode = getCurrentVisualMode();

  drawByMode(mode, power, time);

  requestAnimationFrame(drawAudioVisual);
}
